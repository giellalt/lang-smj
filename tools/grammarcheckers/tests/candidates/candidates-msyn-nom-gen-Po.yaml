  - "Â¶ Guollima NSRa ĂĄjggu barggat nav vaj: 9 sĂĄme dĂĄbe ja rievtesvuoda galggi dokumenteriduvvam ja dĂ„hkkiduvvat lĂĄgajn ja hĂĄldadimen ja bisoduvvat boahtteĂĄjggĂĄj merra- ja vuodnaguollimijn, luossaguollimijn ja sisednamguollimijn, ja dĂĄj tjoahkkeĂŠlĂĄdussan adjĂĄj 9 sĂĄme guollimdajvva ĂĄsaduvvĂĄ gĂ„nnĂ„ luohkkoj hĂĄldadibme ja guollimĂ„sij juohkem dĂĄhpĂĄduvvĂĄ guovlo ja bĂĄjkĂĄlasj dĂĄsen lĂĄhka- ja dĂĄrbbagaprinsihpa gĂĄktuj 9 nuorra Ă„dĂ„ĂĄlggijt Ă„ttjudit ĂŠlĂĄdussaj oahppoĂ„rnigij baktu ja nuorajda sierra ĂĄlggem guollimĂ„sij baktu 9 guollimĂ„sij juohkem nuppĂĄstuvvĂĄ ĂĄhpeguollimis merragĂĄtte guollimijda 9 guollesuvddemvĂŠlggogisvuohta industriaj gĂĄtten tjuovoduvvĂĄ ja tjavggiduvvĂĄ 9 gĂ„ guollebiebbmamrustiga ĂĄsaduvvi, de galggĂĄ dĂŠddo biejaduvvat bĂĄjkĂĄlasj Ă„mastibmĂĄj, birĂĄsgĂĄhttemij ja vuodnaguollĂĄrij dĂĄbĂĄlasj rievtesvuodajda Â¶ Ednambarggo NSRa ĂĄjggu barggat nav vaj: 9 ĂĄrvvodagĂĄdus ĂŠlĂĄdusĂĄn viertti lassĂĄnit ja vaj kultuvralasj ja sebrudak biele ĂŠlĂĄdusĂĄn bisoduvvi ja Ă„vddĂ„nahteduvvi 9 ednambarggo smĂĄv sajijn bisoduvvĂĄ ja nanniduvvĂĄ, aktugis ja adjĂĄj tjoahkkĂĄj ietjĂĄ ĂŠlĂĄdusĂĄjn 9 SĂĄmedikke mierredum ednambarggoplĂĄdna sĂĄme bĂĄjkijn gĂ„tseduvvĂĄ 9 StĂĄhtta ĂĄsat ednambarggopolitihkalasj dajvav sĂĄme Ă„rrombĂĄjkij hĂĄrrĂĄj 9 ĂĄrvvodagĂĄdus ĂŠlĂĄdusĂĄn viertti lassĂĄnit, ja dĂĄbĂĄlasj, kultuvralasj ja ietjĂĄ sebrudakgulluvasj biele ĂŠllosujtos bisoduvvi ja Ă„vddĂ„nahteduvvi dĂ„jmalattjat 9 buorre buolvaj gasskasasj ĂĄlggeĂ„rnigij baktu ĂŠlĂĄdussa bisoduvvĂĄ 9 Ă„dĂ„ ĂŠllosujttolĂĄhka mierreduvvĂĄ gĂ„nnĂ„ le sĂĄme rievtesvuohtadĂĄdjadus vuodon 9 mĂŠrrĂĄdusĂĄ ĂŠllosujttolĂĄgan ja plĂĄdna- ja ĂĄsadimlĂĄgan hiebaduvvi nannim diehti ĂŠllosujto vĂĄjkodimev gĂĄjkka sebrudakplĂĄnimijn 9 duobddĂĄksuodjalibme ĂŠlĂĄdusĂĄ hĂĄrrĂĄj nanniduvvĂĄ 9 diedojt ja dĂĄdjadusĂĄv ĂŠlĂĄdusĂĄ birra ulmutjij lunna lassĂĄn 9 SĂĄmedikke sadje bisodit ĂŠlĂĄdusĂĄ boahtte ĂĄjgev nanniduvvĂĄ ĂŠlĂĄduspolitihkalasj ja hĂĄldadus gatjĂĄlvisĂĄjn Â¶ UrudishĂ