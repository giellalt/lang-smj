  - "Máhtudakmihto Jo2 - oahppogárvedime åhpadusprográmma ja lasádus dábálasj oahppomáhtudahkaj - viddnofágalasj åhpadusprográmma maŋŋela Tjálalasj guládallam Åhpadusá mihttomierre le oahppe galggi máhttet Ietjá hiebalgis máhtudakmihto Tjálalasj guládallam Åhpadusá mihttomierre le oahppe galggi máhttet Njálmálasj guládallam Åhpadusá mihttomierre le oahppe galggá máhttet Oahppoplánan Sámegiella vuostasj giellan le sierra máhtudakmihto låhkåmstrátegijajda 7. jahkedáse maŋŋela: “ Åhpadusá mihttomierre le oahppe galggá máhttet adnet duov dáv låhkåmstrategiijav gå låhkå duov dáv tevstav duon dán láhkáj ” Oahppoplánan sámegiella vuostasj giellan LK06-S ’ an le vuodotjehpudahka máhttet låhkåt dættodam “ Duon dán sjáŋ ŋ ara tækstalåhkåmijn moatten gássjelisvuodadásen åvddånahteduvvá tækstadádjadus ja ávkálasj låhkåmstrategija ” Dan diehti åhpadimgárvvidussa le vuododam dan nali oahppe dåbddi ja duov dáv låhkåmstrátegijav li adnám."
  - "Máná mánájgárddáj båhti iesjguhtik vásádusáj, ja ihkap ij mánájgárdde nuoges buoragit dåjma aktisasjarenan dájda ietjálágásjvuodajt dåhkkidittjat."
  - "NSR ájggu nannit ja åvddånahttet vuodoæládusájt duola dagu ednambargov, ællosujtov, guládusáv, miehttseæládusáv ja duojev, ja dáj tjoahkkáj æládussan."
  - "NSRa ájggu barggat nav vaj: - sáme aktisasjbarggo Sámeparlámentaralasj ráden ja Sámeráden - russi sámij rievtesvuoda ja máhttelisvuoda gájksáme aktisasjbargguj - Sámeráde rijkajgasskasasj viehkkebarggo iemeálmmugij hárráj - Nuorttarijkaj Rádáj sáme - aktisasjbarggo Sámekonvensjåvnåjn ålliduvvá ruvvaláhkáj, ja nav vaj konvensjåvnnå sjaddá guovdásj vædtsagin nuorttarijkaj ja Russlánda aktisasjbargon åvdedittjat sáme - rájájrastá Interreg-prográmma åvddånahteduvvi ja - iemeálmmuga vierttiji oadtjot sierra ájrrasijt - ruhtadimvuodo iemeálmmugij ájrastibmáj Báretzráden ja Árktalasj Ráden - ruhtadimvuodo iemeálmmugij ájrastibmáj Arktalasj Universitehtan - ienep rijka ratifiserij ILO-konvensjåvnåv ja vaj dát Vuona láhkan - ANåj Stuoves Forum iemeálmmugijda ja Sierrarápportøraj sadje ANa sinna ja ålgolt - sjiehtadallama iemeálmmukdeklarasjåvnåjn ålliduvvá, ja vaj deklarasjåvnnå galggá ANan mierreduvvat ja maŋela tjuovoduvvat nav vaj AN-konvensjåvnnån iemeálmmugij rievtesvuodaj birra - iemeálmmugij kultuvrra ja sebrudagá gallgi berustuvvat ANa organajs ja gájkka nasjonálalasj oajválattjajs væráldin – sierra gåjt ásaduvvamijn gå hiehtedáhpádusá li læhkám Majt dahkap Dán prosjevtan ságastallap sámij juohkka álldaris makkár máhttelisvuoda, sávadusá ja niego siján li sámegiela hárráj."
  - "NSRa ájggu barggat nav vaj: - ådåájggásasj ja dábegis sáme musihkkaj ja juojggusijda ájn åvddånibme - buorráni doarjjaårdniga sáme musihka ja ådå musihkalasj åvddånbuktema - sáme musihkkárijda vatteduvvá stuoráp máhttelisvuodav sámijt ájrastit násjonálalattjat ja - ulmutja ávttjiduvvi bargatjit sáme filmaj ja TV - sáme filmajda vatteduvvá buorep máhttelisvuoda jåksåt ja vuoseduvvat sáme - sáme filma ja TV-prográmma digitaliseriduvvi vaj girjjevuorká ja sáme guovdátja dájt - filma, sierra gåjt de mánájda ja nuorajda sámegiellaj njálmálattjat jårggåluvvi ( dubbiduvvi ) Teahter ja lávddedájdda Sáme lávddedájdda le dájddatjerdajs ma li åvddånam ienemusát dájt maŋemus låge jage."
  - "NSRa ájggu barggat nav vaj: - åvddånbuktet sáme æjggorievtesvuodajt ILO-konvensåvnå mærrádusáj - Sámeriektájuogos guoradallá ja buktá oajvvadusájt nannit sáme rievtesvuodajt Finnmárko - sámerievtesvuoda merraluohkkojda, dán gaskan guollimijda, - revtesvuoda vuodoæládusájda nanniduvvá, gånnå le sáme rievtesvuoda - sámij rievtesvuohtadádjadusá ja dábe vuonarijka lágajn ja háldadusájn - sáme giellaguovdátja oadtju máhttelisvuodajt álgget ienep gielladåjmajt bájkijn gånnå giella le - sámegielaga gudi ælla oadtjum låhkåm- ja tjállemoahppamav dáv - ulmutja gudi e máhte sámegielav ja gudi sihti dáv oahppat oadtju - oahppe galggi oadtjot giellaoahppamav nuortta-, julev- ja oarjjelsámegiellaj, dan gáktuj man giellaj gulluji Gielalasj infrastruktuvrra Sámegiela adnem le guládallamnævvo ja tjanástak sáme bájkálasjsebrudagájn."
  - "NUORTTARIJKAJ SÁMEKONVENSJÅVNNÅ Suoma, Vuona ja Svieriga ráddidusá, tjårggiji - sáme li álggoálmmuk dán gålmån rijkan, - sáme li akta álmmuk mij årru moatten rijkan, - sáme álmmugin le sierra kultuvrra ja sebrudakiellem sierra histåvråjn, sierra árbbedábe, sierra giela, sierra æládusá ja sierra vuorddemusá boahtteájggáj, - dán gålmån rijkan le rijkalasj ja rijkkajgasskasasj åvdåsvásstádus sáme kultuvrraj ja sebrudakiellemij dågålasj ævtojt vaddet, - sámeálmmugin le iesjmierredimriektá, - sámeálmmuga kultuvrra ja sebrudakiellem le boanndudahkan åbbålasj kultuvrraj ja sebrudakiellemij genga rijkan, - sámeálmmugin le sierralágásj dárbbo ietjasa sebrudakiellemav rijkkarájáj badjel åvdedit, - sáme hæhttuji bessat ávkkit ednamijt ja tjátjijt mij le ájnas sáme kultuvrraj vuodon, - ja gå sámeálmmuga riektá mierreduvvá, de galggá sierraláhkáj vieledit sáme ájgij milta ælla avtadássásasj álmmugin aneduvvam, ja danen hæhttum rievtugahtesvuodav gierddat, man diehti dán gålmå rijkaj sámedikke - ájgguji buorre boahtteájgev huksat sámeálmmuga iellemij ja kultuvrraj, - le dakkir visjåvnnå rijkaj rájá e galga hieredit sámeálmmuga jali ájnegis sámij aktisasjvuodav, - adni dav vuojnov ådå sámekonvensjåvnnå le sámij dålusjájggásasj riektá ådåstuhttem ja nanostuhttem, da ma jagen 1751 Lappekodisillanin kodifieriduvvin, - dættodi man ájnas la sámijda mierredit ja álmmugin mij váldeduvvá duodaj - dættodi sierraláhkáj sámijn la riektá dajn ednam- ja tjáhtjeguovlojn aktan daj luonndoressursaj ma gávnnuji sámeálmmuga histåvrålasj ájtteklándan, - tjuottjodi sámeálmmuga árbbedábálasj máhtudahka ja árbbedábálasj ja kultuvralasj åvddånbuktemvuohke aktan álmmuga luonndoressurssaanujn le oasse sáme kultuvras, - adni sáme nissunij dille árbbedáhpeguodden sámij sebrudagán galggá nanniduvvat sebrudakiellemin ja aj mij guosská åvdåstibmáj almulasj orgánajn, - sihti sámijt viesutjit avta álmmugin dajn gålmåjn rijkajn, - tjuottodi sáme álmmuga sidodav, mielav ja riektáv åvdåsvásstádusáv válldet ietjasa boahtteájge åvddånimes, - ja tjuottodi sámeálmmuga riektájt ja friddjavuodav rijkajgasskasasj almasjrievtesvuodaj ja dábálasj álmmukriektá milta, ma li dá konvensjåvnåv dahkam aktan lahka aktisasjvuodajn sáme åvdåstiddjij, adni sierraláhkáj ájnnasin konvensjåvnnå åvddål stáhtajs rátifiseriduvvá, dåhkkiduvvá dajs gålmå sámedikkijs, ja adni sijáv vælggogissan sáme álmmuga boahtteájgev oaggit dán konvensjåvnå milta, li guorrasam tjuovvovasj nuorttarijkaj sámekonvensjåvnnåj."
